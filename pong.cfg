# 3D Pong configuration. Lines are `key = value`; '#' starts a comment.
# Missing keys fall back to built-in defaults. The game rewrites this file on
# exit, so toggling fullscreen/vsync in-game persists here.

window.width        = 1280
window.height       = 720
window.vsync        = true
window.fullscreen   = false

physics.rate        = 120       # fixed physics steps per second

audio.volume        = 1.0       # 0.0 .. 1.0
audio.music         = true      # play looping background music
audio.musicVolume   = 0.5

game.difficulty     = 1         # 0=Easy  1=Normal  2=Hard (sets AI + ball speed)
game.maxScore       = 5         # first to this many points wins
game.ballSpeed      = 9.0       # initial serve speed
game.aiSpeed        = 6.5       # AI paddle speed (lower = easier)
game.aiWallChance   = 0.4       # 0..1 chance AI angles a shot at a wall
