# Runtime player configuration. Lives beside player.exe.
window.width = 1280
window.height = 720
window.vsync = true

# Scene to boot on launch (double-click). Relative paths resolve next to
# player.exe, so bundle your exported scene under game/ (see PLAYER_GAME_DIR).
# Override at launch with:  player <path/to/scene.3dgscene>
player.scene = game/level.3dgscene
